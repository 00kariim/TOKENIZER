spring:
  application:
    name: core-banking-simulator

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saham_core_db}
    username: ${SPRING_DATASOURCE_USERNAME:core_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

internal:
  jwt:
    secret: ${INTERNAL_JWT_SECRET:change-me-in-production-min-32chars!!}

pan:
  encryption:
    key: ${PAN_ENCRYPTION_KEY:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMzJieQ==}

logging:
  level:
    com.simulator.bank: INFO
    org.springframework.security: WARN

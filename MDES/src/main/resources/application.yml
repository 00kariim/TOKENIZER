spring:
  application:
    name: mdes-tsp-simulator

  # ─── PostgreSQL / JPA ────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/mdes_vault_db}
    username: ${SPRING_DATASOURCE_USERNAME:mdes_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ─── Flyway migrations ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # Exposes /actuator/health/liveness and /readiness

# ─── Application-specific secrets ────────────────────────────────────────────
# All sensitive values MUST be injected via environment variables in production.
# The defaults below are for local development only.

# Shared HMAC-SHA256 secret between TSP and Core Banking for internal JWTs.
internal:
  jwt:
    secret: ${INTERNAL_JWT_SECRET:change-me-in-production-min-32chars}
    ttl-minutes: 5      # Spec §8.2: short-lived JWTs, 5-minute TTL

# Base64-encoded 32-byte AES-256 master key for token symmetric key encryption at rest.
pan:
  encryption:
    key: ${PAN_ENCRYPTION_KEY:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMzJieXRlcyE=}

# Base URL for Core Banking Feign client.
core:
  banking:
    base-url: ${CORE_BANKING_BASE_URL:http://core-banking:8082}

# TSP RSA-2048 key pair for PAN payload decryption.
# Flutter RSA-OAEP encrypts the PAN before sending; MDES decrypts it here.
# If files are absent on startup, a fresh pair is generated (simulator mode).
tsp:
  rsa:
    private-key-path: ${TSP_RSA_PRIVATE_KEY_PATH:/app/certs/tsp_private.pem}
    public-key-path:  ${TSP_RSA_PUBLIC_KEY_PATH:/app/certs/tsp_public.pem}

# Token defaults (spec §10.2)
mdes:
  token:
    default-expiry-months: 36   # expressed as MMYY in generated token (runtime-computed)
    otp-ttl-minutes: 10
    max-otp-attempts: 3

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.simulator.mdes: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

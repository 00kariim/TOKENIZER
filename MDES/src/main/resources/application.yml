spring:
  application:
    name: mdes-tsp-simulator

  # ─── PostgreSQL / JPA ────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mdes_vault_db}
    username: ${SPRING_DATASOURCE_USERNAME:mdes_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ─── Flyway migrations ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # Exposes /actuator/health/liveness and /readiness

# ─── Application-specific secrets ────────────────────────────────────────────
# All sensitive values MUST be injected via environment variables in production.
# The defaults below are for local development only.

# Shared HMAC-SHA256 secret between TSP and Core Banking for internal JWTs.
internal:
  jwt:
    secret: ${INTERNAL_JWT_SECRET:change-me-in-production-min-32chars}

# Base64-encoded 32-byte AES-256 master key for token symmetric key encryption at rest.
pan:
  encryption:
    key: ${PAN_ENCRYPTION_KEY:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMzJieQ==}

# Base URL for Core Banking Feign client.
core:
  banking:
    base-url: ${CORE_BANKING_BASE_URL:http://core-banking:8082}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.simulator.mdes: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # DDL managed by Hibernate in test mode

internal:
  jwt:
    secret: test-secret-min-32-chars-for-hmac-ok

pan:
  encryption:
    # A valid Base64-encoded 32-byte key for tests (NOT real production key)
    key: dGVzdC1rZXktMzItYnl0ZXMtZm9yLXVuaXQtdGVzdHM=

core:
  banking:
    base-url: http://localhost:9999   # Wiremock / MockBean in tests

logging:
  level:
    com.simulator.mdes: DEBUG
